spring:
  application:
    name: dazhongdianping-backend
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:dazhongdianping-test-${random.uuid};MODE=MYSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  sql:
    init:
      mode: always
  jackson:
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger - [%X{traceId}] %msg%n"

app:
  admin:
    account: admin
    password: admin123456
    name: 系统管理员
    access-token-expire-seconds: 7200
  merchant:
    account: merchant_eu_sichuan@example.com
    password: merchant123456
    merchant-id: 2001
    access-token-expire-seconds: 7200
  auth:
    jwt-secret: local-dev-auth-secret-please-change
    access-token-expire-seconds: 7200
    refresh-token-expire-seconds: 2592000
    send-code-rate-limit:
      account-short-window-seconds: 60
      account-short-window-max-requests: 1
      account-long-window-seconds: 600
      account-long-window-max-requests: 5
      device-window-seconds: 600
      device-window-max-requests: 1000
      ip-window-seconds: 600
      ip-window-max-requests: 1000
  file-storage:
    base-dir: local-storage/uploads
    max-image-bytes: 5242880
