spring:
  application:
    name: dazhongdianping-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${APP_DB_HOST:127.0.0.1}:${APP_DB_PORT:3306}/${APP_DB_NAME:dazhongdianping}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${APP_DB_USERNAME:root}
    password: ${APP_DB_PASSWORD:}
  data:
    redis:
      host: ${APP_REDIS_HOST:127.0.0.1}
      port: ${APP_REDIS_PORT:6379}
      password: ${APP_REDIS_PASSWORD:}
      database: ${APP_REDIS_DATABASE:0}
  sql:
    init:
      mode: never
  jackson:
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: ${APP_REDIS_HEALTH_ENABLED:false}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger - [%X{traceId}] %msg%n"

app:
  payment:
    notify-secret: ${APP_PAYMENT_NOTIFY_SECRET:local-payment-notify-secret}
    mock-enabled: ${APP_PAYMENT_MOCK_ENABLED:true}
  search:
    provider: ${APP_SEARCH_PROVIDER:mysql}
    base-url: ${APP_SEARCH_BASE_URL:http://127.0.0.1:9200}
    index-name: ${APP_SEARCH_INDEX_NAME:dzdp_shop_v1}
    fallback-on-error: ${APP_SEARCH_FALLBACK_ON_ERROR:true}
  infrastructure:
    state-store:
      provider: ${APP_STATE_STORE_PROVIDER:local}
      key-prefix: ${APP_STATE_STORE_KEY_PREFIX:dzdp}
  admin:
    access-token-expire-seconds: ${APP_ADMIN_ACCESS_TOKEN_EXPIRE_SECONDS:7200}
  merchant:
    account: ${APP_MERCHANT_ACCOUNT:merchant_eu_sichuan@example.com}
    password: ${APP_MERCHANT_PASSWORD:merchant123456}
    merchant-id: ${APP_MERCHANT_ID:2001}
    access-token-expire-seconds: ${APP_MERCHANT_ACCESS_TOKEN_EXPIRE_SECONDS:7200}
  auth:
    jwt-secret: local-dev-auth-secret-please-change
    access-token-expire-seconds: 7200
    refresh-token-expire-seconds: 2592000
    send-code-rate-limit:
      account-short-window-seconds: 60
      account-short-window-max-requests: 1
      account-long-window-seconds: 600
      account-long-window-max-requests: 5
      device-window-seconds: 600
      device-window-max-requests: 3
      ip-window-seconds: 600
      ip-window-max-requests: 10
  file-storage:
    provider: ${APP_FILE_STORAGE_PROVIDER:local}
    base-dir: local-storage/uploads
    max-image-bytes: 5242880
    s3:
      bucket: ${APP_S3_BUCKET:}
      region: ${APP_S3_REGION:us-east-1}
      endpoint: ${APP_S3_ENDPOINT:}
      public-base-url: ${APP_S3_PUBLIC_BASE_URL:}
      access-key: ${APP_S3_ACCESS_KEY:}
      secret-key: ${APP_S3_SECRET_KEY:}
      path-style-access-enabled: ${APP_S3_PATH_STYLE_ACCESS_ENABLED:false}
