name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      minio:
        image: bitnami/minio:2024
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: dzdp-smoke
        ports:
          - 9000:9000
        options: >-
          --health-cmd="curl -f http://127.0.0.1:9000/minio/health/live || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
        ports:
          - 9200:9200
        options: >-
          --health-cmd="curl -fsS http://127.0.0.1:9200/_cluster/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      APP_DB_HOST: 127.0.0.1
      APP_DB_PORT: 3306
      APP_DB_NAME: dazhongdianping
      APP_DB_USERNAME: root
      APP_DB_PASSWORD: root
      APP_BACKEND_SMOKE_PORT: 18080
      APP_REDIS_HOST: 127.0.0.1
      APP_REDIS_PORT: 6379
      APP_STATE_STORE_PROVIDER: redis
      APP_STATE_STORE_KEY_PREFIX: dzdp:ci
      APP_S3_ENDPOINT: http://127.0.0.1:9000
      APP_S3_BUCKET: dzdp-smoke
      APP_S3_REGION: us-east-1
      APP_S3_PUBLIC_BASE_URL: http://127.0.0.1:9000/dzdp-smoke
      APP_S3_ACCESS_KEY: minioadmin
      APP_S3_SECRET_KEY: minioadmin
      APP_S3_PATH_STYLE_ACCESS_ENABLED: "true"
      APP_SEARCH_BASE_URL: http://127.0.0.1:9200
      PLAYWRIGHT_CHANNEL: chromium

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            admin-web/package-lock.json
            merchant-web/package-lock.json

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Install frontend dependencies
        run: |
          npm ci --prefix web
          npm ci --prefix admin-web
          npm ci --prefix merchant-web

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Make Maven wrapper executable
        run: chmod +x backend/mvnw

      - name: Verify all
        shell: pwsh
        run: ./scripts/ci/verify-all.ps1 -IncludeMysqlSmoke -IncludeStorageSmoke -IncludeBrowserSmoke -IncludeElasticsearchSmoke -IncludeFlutter
